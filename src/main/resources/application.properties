spring.application.name=dreamreach

# Cloud Deployment: Use the environment PORT if it exists, otherwise default to 8080 for local dev
server.port=${PORT:8080}

# ==========================================
# DATABASE & FLYWAY MIGRATION
# ==========================================
# PostgreSQL Database Connection Settings
# Injects Render URL, defaults to local Postgres for dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dreamreach}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# The Handover: Tell Hibernate to validate the schema, but let Flyway build it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration (Database Version Control)
spring.flyway.enabled=true
spring.flyway.out-of-order=true

# Force Flyway to baseline the DB at Version 0, so V3 correctly runs
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Explicitly set the locations so Spring Boot doesn't guess
spring.flyway.locations=classpath:db/migration


# ==========================================
# SECURITY & CORS
# ==========================================
# JWT Security Configuration
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# Define the dynamic CORS origin
# Added local default so local development still works
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}


# ==========================================
# EMAIL SMTP ENGINE
# ==========================================
# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:dev@dreamreach.com}
spring.mail.password=${SMTP_PASSWORD:devpassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# This ensures the 'From' address matches your Gmail
spring.mail.from=${SMTP_USERNAME:dev@dreamreach.com}

# Security Policy
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000