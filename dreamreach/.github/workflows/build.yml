name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This environment variable silences the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # This explicitly strips Windows line endings out of the Gradle wrapper before running it
      - name: Fix Windows Line Endings and Grant Permissions
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build