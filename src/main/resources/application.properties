spring.application.name=dreamreach
# Cloud Deployment: Use the environment PORT if it exists, otherwise default to 8080 for local dev
server.port=${PORT:8080}

# Enable the H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Connection Settings
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Tell Hibernate to automatically create/update our tables based on our Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Security Configuration
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# Define the dynamic CORS origin
# Added local default so local development still works
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Email Configuration (Gmail SMTP)
# Added placeholder defaults to prevent GitHub build failures
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:dev@dreamreach.com}
spring.mail.password=${SMTP_PASSWORD:devpassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# This ensures the 'From' address matches your Gmail
spring.mail.from=${SMTP_USERNAME:dev@dreamreach.com}

# Security Policy
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000