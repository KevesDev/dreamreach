name: Java CI with Gradle

# This dictates when the pipeline runs.
# We want it to run every time code is pushed to the main branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # This provisions a temporary Linux server for our test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install the exact version of Java we are using
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # Step 3: Grant execute permission for the Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Compile the code, run the seeder, and execute tests
      - name: Build with Gradle
        run: ./gradlew build
