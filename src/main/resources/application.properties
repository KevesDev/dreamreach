spring.application.name=dreamreach

# Port Configuration
# Render provides the PORT variable at runtime; defaults to 8080 for local dev
server.port=${PORT:8080}

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Connection (In-Memory for now)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Persistence Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security: JWT Configuration
# Falls back to the default key for local dev, uses JWT_SECRET variable on Render
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# CORS: Allowed Origins
# Falls back to Vite's local port, uses FRONTEND_URL variable on Render
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Email: Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Sender address mapping (must match the Gmail account)
spring.mail.from=${SMTP_USERNAME}

# SMTP Network Timeouts
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000